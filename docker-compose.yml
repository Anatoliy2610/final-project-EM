services:
  app:
    image: final_app
    build: ./
    ports:
      - "8000:8000"
    depends_on:
      - db
      
  db:
    image: postgres:16.11-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: postgres
  
    ports:
      - "5432:5432"
    restart: always
